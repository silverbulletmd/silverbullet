name: editor
requiredPermissions:
  - fetch
functions:
  setEditorMode:
    path: "./editor.ts:setEditorMode"
    events:
      - editor:init
  toggleDarkMode:
    path: "./editor.ts:toggleDarkMode"
    command:
      name: "Editor: Toggle Dark Mode"
  toggleMarkdownSyntaxRendering:
    path: "./editor.ts:toggleMarkdownSyntaxRendering"
    command:
      name: "Editor: Toggle Markdown Syntax Rendering"
  newWindow:
    path: editor.ts:newWindowCommand
    command:
      name: "Editor: New Window"
      key: "Ctrl-n"
      mac: "Cmd-n"

  openCommandPalette:
    path: editor.ts:openCommandPalette
    command:
      name: "Open Command Palette"
      key: "Ctrl-/"
      mac: "Cmd-/"

  openPageNavigator:
    path: editor.ts:openPageNavigator
    command:
      name: "Navigate: Page Picker"
      key: "Ctrl-k"
      mac: "Cmd-k"

  openMetaNavigator:
    path: editor.ts:openMetaNavigator
    command:
      name: "Navigate: Meta Picker"
      key: "Ctrl-Shift-k"
      mac: "Cmd-Shift-k"

  openTagNavigator:
    path: editor.ts:openTagNavigator
    command:
      name: "Navigate: Tag Picker"
      key: "Ctrl-Alt-t"

  openDocumentNavigator:
    path: editor.ts:openDocumentNavigator
    command:
      name: "Navigate: Document Picker"
      key: "Ctrl-o"
      mac: "Cmd-o"

  openAllNavigator:
    path: editor.ts:openAllNavigator
    command:
      name: "Navigate: Anything Picker"

  # Page operations
  deletePage:
    path: "./page.ts:deletePage"
    command:
      name: "Page: Delete"
      requireMode: rw
      requireEditor: page
  copyPage:
    path: "./page.ts:copyPage"
    command:
      name: "Page: Copy"
      requireMode: rw
      requireEditor: page

  # Completion
  pageComplete:
    path: "./complete.ts:pageComplete"
    events:
      - editor:complete

  reloadSystem:
    path: editor.ts:reloadSystem
    command:
      name: "System: Reload"
      key: Ctrl-Alt-r

  refreshAllWidgets:
    path: editor.ts:refreshAllWidgets
    command:
      name: "Widgets: Refresh All"
      requireEditor: page

  footnoteComplete:
    path: complete.ts:footnoteComplete
    events:
      - editor:complete

  languageComplete:
    path: complete.ts:languageComplete
    events:
      - editor:complete

  # Create page under cursor
  createPageUnderCursorCommand:
    path: "./navigate.ts:createPageUnderCursorCommand"
    command:
      name: "Page: Create Under Cursor"
      key: "Ctrl-Shift-Enter"
      mac: "Cmd-Shift-Enter"
      requireEditor: page
      requireMode: rw

  # Navigation
  linkNavigate:
    path: "./navigate.ts:linkNavigate"
    command:
      name: "Navigate: To This Page"
      key: Ctrl-Enter
      mac: Cmd-Enter
      requireEditor: page

  clickNavigate:
    path: "./navigate.ts:clickNavigate"
    events:
      - page:click

  navigateHome:
    path: "./navigate.ts:navigateCommand"
    command:
      name: "Navigate: Home"
      key: "Ctrl-g h"
      page: ""

  moveToPos:
    path: "./editor.ts:moveToPosCommand"
    command:
      name: "Navigate: To Position"
      requireEditor: page

  copyRefCommand:
    path: "./editor.ts:copyRefCommand"
    command:
      name: "Navigate: Copy Ref To Current Position"
      requireEditor: page

  copyLinkCommand:
    path: "./editor.ts:copyLinkCommand"
    command:
      name: "Navigate: Copy Link To Current Position"
      requireEditor: page

  moveToLine:
    path: "./editor.ts:moveToLineCommand"
    command:
      name: "Navigate: To Line"
      requireEditor: page

  navigateToPage:
    path: "./navigate.ts:navigateToPage"
    command:
      name: "Navigate: To Page"
      hide: true

  navigateToURL:
    path: "./navigate.ts:navigateToURL"
    command:
      name: "Navigate: To URL"
      hide: true

  navigateBack:
    path: "./navigate.ts:navigateBack"
    command:
      name: "Navigate: Back in History"

  navigateForward:
    path: "./navigate.ts:navigateForward"
    command:
      name: "Navigate: Forward in History"

  # Text editing commands
  quoteSelectionCommand:
    path: ./text.ts:quoteSelection
    command:
      name: "Text: Quote Selection"
      key: "Ctrl-Shift-."
      mac: "Cmd-Shift-."
      requireMode: rw
      requireEditor: page
  listifySelection:
    path: ./text.ts:listifySelection
    command:
      name: "Text: Listify Selection"
      key: "Ctrl-Shift-8"
      mac: "Cmd-Shift-8"
      requireMode: rw
      requireEditor: page
  numberListifySelection:
    path: ./text.ts:numberListifySelection
    command:
      name: "Text: Number Listify Selection"
      requireMode: rw
      requireEditor: page
  linkSelection:
    path: ./text.ts:linkSelection
    command:
      name: "Text: Link Selection"
      requireMode: rw
      requireEditor: page
  bold:
    path: ./text.ts:wrapSelection
    command:
      name: "Text: Bold"
      key: "Ctrl-b"
      mac: "Cmd-b"
      wrapper: "**"
      requireMode: rw
      requireEditor: page
  italic:
    path: ./text.ts:wrapSelection
    command:
      name: "Text: Italic"
      key: "Ctrl-i"
      mac: "Cmd-i"
      wrapper: "_"
      requireMode: rw
      requireEditor: page
  strikethrough:
    path: ./text.ts:wrapSelection
    command:
      name: "Text: Strikethrough"
      key: "Ctrl-Shift-s"
      wrapper: "~~"
      requireMode: rw
      requireEditor: page
  marker:
    path: ./text.ts:wrapSelection
    command:
      name: "Text: Marker"
      key: "Ctrl-Alt-m"
      wrapper: "=="
      requireMode: rw
      requireEditor: page
  centerCursor:
    path: "./editor.ts:centerCursorCommand"
    command:
      name: "Navigate: Center Cursor"
      key: "Ctrl-Alt-l"
      requireMode: rw
      requireEditor: page
  deleteLine:
    path: "./editor.ts:deleteLineCommand"
    command:
      name: "Delete Line"
      key: "Ctrl-d"
      requireMode: rw
      requireEditor: page

  # Debug commands
  parseCommand:
    path: ./system.ts:parsePageCommand
    command:
      name: "Debug: Parse Document"
      requireEditor: page

  # Vim
  toggleVimMode:
    path: "./vim.ts:toggleVimMode"
    command:
      name: "Editor: Toggle Vim Mode"
      requireEditor: page
  loadVimConfig:
    path: "./vim.ts:loadVimConfig"
    command:
      name: "Editor: Vim: Load Vim Config"
      requireEditor: page
    events:
      - editor:modeswitch

  # Random stuff
  statsCommand:
    path: ./stats.ts:statsCommand
    command:
      name: "Stats: Show"
      requireEditor: page

  # Client commands
  reloadUICommand:
    path: ./system.ts:reloadUICommand
    command:
      name: "Client: Reload UI"

  wipeClientCommand:
    path: ./system.ts:wipeClientCommand
    command:
      name: "Client: Wipe"

  wipeAndLogoutCommand:
    path: ./system.ts:wipeAndLogoutCommand
    command:
      name: "Client: Logout"

  versionCommand:
    path: ./help.ts:versionCommand
    command:
      name: "Client: Version"

  uploadFileCommand:
    path: ./upload.ts:uploadFile
    command:
      name: "Upload: File"
      requireMode: rw

  # Outline commands
  outlineMoveUp:
    path: ./outline.ts:moveItemUp
    command:
      name: "Outline: Move Up"
      key:
        - "Alt-ArrowUp"
        - "Mod-. k"
      requireMode: rw
      requireEditor: page

  outlineMoveDown:
    path: ./outline.ts:moveItemDown
    command:
      name: "Outline: Move Down"
      key:
        - "Alt-ArrowDown"
        - "Mod-. j"
      requireMode: rw
      requireEditor: page

  outlineIndent:
    path: ./outline.ts:indentItem
    command:
      name: "Outline: Move Right"
      key: "Mod-. l"
      requireMode: rw
      requireEditor: page

  outlineOutdent:
    path: ./outline.ts:outdentItem
    command:
      name: "Outline: Move Left"
      key: "Mod-. h"
      requireMode: rw
      requireEditor: page

  # Outline folding commands
  foldCommand:
    path: ./outline.ts:foldCommand
    command:
      name: "Outline: Fold"
      requireEditor: page
  unfoldCommand:
    path: ./outline.ts:unfoldCommand
    command:
      name: "Outline: Unfold"
      requireEditor: page
  toggleFoldCommand:
    path: ./outline.ts:toggleFoldCommand
    command:
      name: "Outline: Toggle Fold"
      key: "Mod-. Mod-."
      requireEditor: page
  foldAllCommand:
    path: ./outline.ts:foldAllCommand
    command:
      name: "Outline: Fold All"
      requireEditor: page
  unfoldAllCommand:
    path: ./outline.ts:unfoldAllCommand
    command:
      name: "Outline: Unfold All"
      requireEditor: page
  findInPageCommand:
    path: editor.ts:findInPageCommand
    command:
      name: "Editor: Find in Page"
      key: "Ctrl-f"
      mac: "Cmd-f"
      requireEditor: page

  # Selection / indentation
  selectAllCommand:
    path: ./editor.ts:selectAllCommand
    command:
      name: "Editor: Select All"
      key: "Ctrl-a"
      mac: "Cmd-a"
      requireEditor: page
      disableInVim: true

  indentCommand:
    path: ./editor.ts:indentCommand
    command:
      name: "Editor: Indent"
      key:
        - "Ctrl-]"
        - "Tab"
      mac:
        - "Cmd-]"
        - "Tab"
      requireMode: rw
      requireEditor: page

  outdentCommand:
    path: ./editor.ts:outdentCommand
    command:
      name: "Editor: Outdent"
      key: "Shift-Tab"
      mac:
        - "Cmd-["
        - "Shift-Tab"
      requireMode: rw
      requireEditor: page

  # Undo/redo
  undoCommand:
    path: ./editor.ts:undoCommand
    command:
      name: "Editor: Undo"
      key: "Ctrl-z"
      mac: "Cmd-z"
      requireMode: rw
      requireEditor: page
  redoCommand:
    path: ./editor.ts:redoCommand
    command:
      name: "Editor: Redo"
      key: "Ctrl-y"
      mac: "Cmd-Shift-z"
      requireMode: rw
      requireEditor: page

  # Demo
  customFlashMessage:
    path: editor.ts:customFlashMessage
    command:
      name: "Flash: Custom Message"
      hide: true
      contexts:
        - internal

  deleteDocument:
    path: "./document.ts:deleteDocument"
    command:
      name: "Document: Delete"
      requireMode: rw
      requireEditor: notpage

  # Cursor motions (replacing standardKeymap)
  cursorCharLeftCommand:
    path: ./editor.ts:cursorCharLeftCommand
    command:
      name: "Editor: Cursor Char Left"
      key: "ArrowLeft"
      requireEditor: page
      disableInVim: true
  cursorCharRightCommand:
    path: ./editor.ts:cursorCharRightCommand
    command:
      name: "Editor: Cursor Char Right"
      key: "ArrowRight"
      requireEditor: page
      disableInVim: true
  cursorGroupLeftCommand:
    path: ./editor.ts:cursorGroupLeftCommand
    command:
      name: "Editor: Cursor Group Left"
      key: "Ctrl-ArrowLeft"
      mac: "Alt-ArrowLeft"
      requireEditor: page
      disableInVim: true
  cursorGroupRightCommand:
    path: ./editor.ts:cursorGroupRightCommand
    command:
      name: "Editor: Cursor Group Right"
      key: "Ctrl-ArrowRight"
      mac: "Alt-ArrowRight"
      requireEditor: page
      disableInVim: true
  cursorLineBoundaryLeftCommand:
    path: ./editor.ts:cursorLineBoundaryLeftCommand
    command:
      name: "Editor: Cursor Line Boundary Left"
      mac: "Cmd-ArrowLeft"
      requireEditor: page
      disableInVim: true
  cursorLineBoundaryRightCommand:
    path: ./editor.ts:cursorLineBoundaryRightCommand
    command:
      name: "Editor: Cursor Line Boundary Right"
      mac: "Cmd-ArrowRight"
      requireEditor: page
      disableInVim: true
  cursorLineStartCommand:
    path: ./editor.ts:cursorLineStartCommand
    command:
      name: "Editor: Cursor Line Start"
      key: "Home"
      requireEditor: page
      disableInVim: true
  cursorLineEndCommand:
    path: ./editor.ts:cursorLineEndCommand
    command:
      name: "Editor: Cursor Line End"
      key:
        - "End"
        - "Ctrl-e"
      mac:
        - "End"
        - "Ctrl-e"
      requireEditor: page
      disableInVim: true
  cursorDocStartCommand:
    path: ./editor.ts:cursorDocStartCommand
    command:
      name: "Editor: Cursor Doc Start"
      key: "Ctrl-Home"
      mac:
        - "Ctrl-Home"
        - "Cmd-ArrowUp"
      requireEditor: page
      disableInVim: true
  cursorDocEndCommand:
    path: ./editor.ts:cursorDocEndCommand
    command:
      name: "Editor: Cursor Doc End"
      key: "Ctrl-End"
      mac:
        - "Ctrl-End"
        - "Cmd-ArrowDown"
      requireEditor: page
      disableInVim: true
  cursorLineUpCommand:
    path: ./editor.ts:cursorLineUpCommand
    command:
      name: "Editor: Cursor Line Up"
      key:
        - "ArrowUp"
        - "Ctrl-p"
      mac: "ArrowUp"
      requireEditor: page
      disableInVim: true
  cursorLineDownCommand:
    path: ./editor.ts:cursorLineDownCommand
    command:
      name: "Editor: Cursor Line Down"
      key: "ArrowDown"
      mac: "ArrowDown"
      requireEditor: page
      disableInVim: true
  cursorPageUpCommand:
    path: ./editor.ts:cursorPageUpCommand
    command:
      name: "Editor: Cursor Page Up"
      key: "PageUp"
      mac:
        - "PageUp"
        - "Ctrl-ArrowUp"
      requireEditor: page
      disableInVim: true
  cursorPageDownCommand:
    path: ./editor.ts:cursorPageDownCommand
    command:
      name: "Editor: Cursor Page Down"
      key:
        - "PageDown"
        - "Ctrl-v"
      mac:
        - "PageDown"
        - "Ctrl-v"
        - "Ctrl-ArrowDown"
      requireEditor: page
      disableInVim: true

  # Selection-extending motions
  selectCharLeftCommand:
    path: ./editor.ts:selectCharLeftCommand
    command:
      name: "Editor: Select Char Left"
      key: "Shift-ArrowLeft"
      requireEditor: page
      disableInVim: true
  selectCharRightCommand:
    path: ./editor.ts:selectCharRightCommand
    command:
      name: "Editor: Select Char Right"
      key: "Shift-ArrowRight"
      requireEditor: page
      disableInVim: true
  selectGroupLeftCommand:
    path: ./editor.ts:selectGroupLeftCommand
    command:
      name: "Editor: Select Group Left"
      key: "Shift-Ctrl-ArrowLeft"
      mac: "Shift-Alt-ArrowLeft"
      requireEditor: page
      disableInVim: true
  selectGroupRightCommand:
    path: ./editor.ts:selectGroupRightCommand
    command:
      name: "Editor: Select Group Right"
      key: "Shift-Ctrl-ArrowRight"
      mac: "Shift-Alt-ArrowRight"
      requireEditor: page
      disableInVim: true
  selectLineBoundaryLeftCommand:
    path: ./editor.ts:selectLineBoundaryLeftCommand
    command:
      name: "Editor: Select Line Boundary Left"
      mac: "Shift-Cmd-ArrowLeft"
      requireEditor: page
      disableInVim: true
  selectLineBoundaryRightCommand:
    path: ./editor.ts:selectLineBoundaryRightCommand
    command:
      name: "Editor: Select Line Boundary Right"
      mac: "Shift-Cmd-ArrowRight"
      requireEditor: page
      disableInVim: true
  selectLineStartCommand:
    path: ./editor.ts:selectLineStartCommand
    command:
      name: "Editor: Select Line Start"
      key: "Shift-Home"
      requireEditor: page
      disableInVim: true
  selectLineEndCommand:
    path: ./editor.ts:selectLineEndCommand
    command:
      name: "Editor: Select Line End"
      key:
        - "Shift-End"
        - "Shift-Ctrl-e"
      mac:
        - "Shift-End"
        - "Shift-Ctrl-e"
      requireEditor: page
      disableInVim: true
  selectDocStartCommand:
    path: ./editor.ts:selectDocStartCommand
    command:
      name: "Editor: Select Doc Start"
      key: "Shift-Ctrl-Home"
      mac:
        - "Shift-Ctrl-Home"
        - "Shift-Cmd-ArrowUp"
      requireEditor: page
      disableInVim: true
  selectDocEndCommand:
    path: ./editor.ts:selectDocEndCommand
    command:
      name: "Editor: Select Doc End"
      key: "Shift-Ctrl-End"
      mac:
        - "Shift-Ctrl-End"
        - "Shift-Cmd-ArrowDown"
      requireEditor: page
      disableInVim: true
  selectLineUpCommand:
    path: ./editor.ts:selectLineUpCommand
    command:
      name: "Editor: Select Line Up"
      key:
        - "Shift-ArrowUp"
        - "Shift-Ctrl-p"
      mac: "Shift-ArrowUp"
      requireEditor: page
      disableInVim: true
  selectLineDownCommand:
    path: ./editor.ts:selectLineDownCommand
    command:
      name: "Editor: Select Line Down"
      key: "Shift-ArrowDown"
      mac: "Shift-ArrowDown"
      requireEditor: page
      disableInVim: true
  selectPageUpCommand:
    path: ./editor.ts:selectPageUpCommand
    command:
      name: "Editor: Select Page Up"
      key: "Shift-PageUp"
      mac:
        - "Shift-PageUp"
        - "Shift-Ctrl-ArrowUp"
      requireEditor: page
      disableInVim: true
  selectPageDownCommand:
    path: ./editor.ts:selectPageDownCommand
    command:
      name: "Editor: Select Page Down"
      key: "Shift-PageDown"
      mac:
        - "Shift-PageDown"
        - "Shift-Ctrl-ArrowDown"
      requireEditor: page
      disableInVim: true

  # Edit / delete
  insertNewlineCommand:
    path: ./editor.ts:insertNewlineCommand
    command:
      name: "Editor: Insert Newline"
      key: "Enter"
      mac: "Enter"
      requireMode: rw
      requireEditor: page
      disableInVim: true
  deleteCharBackwardCommand:
    path: ./editor.ts:deleteCharBackwardCommand
    command:
      name: "Editor: Delete Char Backward"
      key:
        - "Backspace"
        - "Ctrl-h"
      mac:
        - "Backspace"
        - "Ctrl-h"
      requireMode: rw
      requireEditor: page
      disableInVim: true
  deleteCharForwardCommand:
    path: ./editor.ts:deleteCharForwardCommand
    command:
      name: "Editor: Delete Char Forward"
      key: "Delete"
      mac: "Delete"
      requireMode: rw
      requireEditor: page
      disableInVim: true
  deleteGroupBackwardCommand:
    path: ./editor.ts:deleteGroupBackwardCommand
    command:
      name: "Editor: Delete Group Backward"
      key: "Ctrl-Backspace"
      mac: "Alt-Backspace"
      requireMode: rw
      requireEditor: page
      disableInVim: true
  deleteGroupForwardCommand:
    path: ./editor.ts:deleteGroupForwardCommand
    command:
      name: "Editor: Delete Group Forward"
      key: "Ctrl-Delete"
      mac: "Alt-Delete"
      requireMode: rw
      requireEditor: page
      disableInVim: true
  deleteLineBoundaryBackwardCommand:
    path: ./editor.ts:deleteLineBoundaryBackwardCommand
    command:
      name: "Editor: Delete Line Boundary Backward"
      mac: "Cmd-Backspace"
      requireMode: rw
      requireEditor: page
      disableInVim: true
  deleteLineBoundaryForwardCommand:
    path: ./editor.ts:deleteLineBoundaryForwardCommand
    command:
      name: "Editor: Delete Line Boundary Forward"
      mac: "Cmd-Delete"
      requireMode: rw
      requireEditor: page
      disableInVim: true
  transposeCharsCommand:
    path: ./editor.ts:transposeCharsCommand
    command:
      name: "Editor: Transpose Chars"
      key: "Ctrl-t"
      mac: "Ctrl-t"
      requireMode: rw
      requireEditor: page
      disableInVim: true

  # Completion popup
  startCompletionCommand:
    path: ./editor.ts:startCompletionCommand
    command:
      name: "Editor: Start Completion"
      key: "Ctrl-Space"
      requireEditor: page
      disableInVim: true
  closeCompletionCommand:
    path: ./editor.ts:closeCompletionCommand
    command:
      name: "Editor: Close Completion"
      key: "Escape"
      requireEditor: page
      disableInVim: true
