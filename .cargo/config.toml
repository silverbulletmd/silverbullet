# Cross-compilation toolchain wiring for the release targets.
#
# These settings only take effect when building the named `--target`, so a
# normal host build (`cargo build`, tests, the default `x86_64`/`aarch64` host
# triple) is completely unaffected. We cross-compile natively with `cargo build
# --target …` (no `cargo-zigbuild`), so each target needs its C cross-compiler +
# linker installed and on `PATH`:
#
#   x86_64-unknown-linux-musl       musl-tools (apt)                  → musl-gcc
#   aarch64-unknown-linux-musl      aarch64-linux-musl-cross (musl.cc)→ aarch64-linux-musl-gcc
#   armv7-unknown-linux-musleabihf  armv7l-linux-musleabihf-cross     → armv7l-linux-musleabihf-gcc
#   x86_64-pc-windows-gnu           gcc-mingw-w64-x86-64 (apt)         → x86_64-w64-mingw32-gcc
#
# `ring` (the rustls crypto backend) compiles C + assembly via its build script,
# so each target needs a matching C cross-compiler (the `CC_*`/`AR_*` below),
# not just a linker.

[target.x86_64-unknown-linux-musl]
linker = "musl-gcc"

[target.aarch64-unknown-linux-musl]
linker = "aarch64-linux-musl-gcc"

[target.armv7-unknown-linux-musleabihf]
linker = "armv7l-linux-musleabihf-gcc"

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"

# C cross-compilers for `ring`'s build script (the `cc` crate reads `CC_<triple>`
# / `AR_<triple>`). Only consulted when building the corresponding target.
[env]
CC_x86_64_unknown_linux_musl = "musl-gcc"
CC_aarch64_unknown_linux_musl = "aarch64-linux-musl-gcc"
AR_aarch64_unknown_linux_musl = "aarch64-linux-musl-ar"
CC_armv7_unknown_linux_musleabihf = "armv7l-linux-musleabihf-gcc"
AR_armv7_unknown_linux_musleabihf = "armv7l-linux-musleabihf-ar"
CC_x86_64_pc_windows_gnu = "x86_64-w64-mingw32-gcc"
