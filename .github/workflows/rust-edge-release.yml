name: Rust edge release (binaries)

# Produces the all-platform Rust release archives (server + `sb` CLI) and
# publishes them to the dedicated `edge-rust` GitHub prerelease. This is the
# binary-release counterpart to `rust-edge.yml` (which builds the Docker
# images); the two run independently on every `rust-backend` push, mirroring the
# Go `edge.yml` / `docker.yml` split.
#
# Unlike the Go `edge.yml` (which cross-compiles every platform from one macOS
# runner via Go's toolchain-free cross-compilation), Rust needs the per-target C
# cross-toolchains, so the work is split: a Linux job cross-compiles the
# linux-musl + windows-gnu targets (apt toolchains; wiring in .cargo/config.toml),
# and a macOS job builds + signs + notarizes the Apple binaries natively.

on:
  workflow_dispatch:
  push:
    branches:
      - "rust-backend"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Setup repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup Rust (linux musl + windows-gnu + freebsd targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,armv7-unknown-linux-musleabihf,x86_64-pc-windows-gnu,x86_64-unknown-freebsd

      - name: Install cross-toolchains
        run: |
          sudo apt-get update
          # apt-only C cross-compilers; Rust supplies the static musl libc itself.
          # clang/lld/llvm are for the FreeBSD cross-build (no apt freebsd gcc).
          # (linker/CC wiring lives in .cargo/config.toml)
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu \
                                  gcc-arm-linux-gnueabihf gcc-mingw-w64-x86-64 \
                                  clang lld llvm

      - name: Install npm dependencies
        run: npm ci

      - name: Build server + CLI release archives (linux x3 musl + windows)
        run: |
          make build-server-releases
          make build-cli-releases-rust

      - name: Build FreeBSD sb CLI (experimental — best effort)
        # FreeBSD cross is fiddly (clang + sysroot). The sysroot fetch AND the
        # build live together here under continue-on-error, AFTER the main build,
        # so nothing FreeBSD-related can ever block the rest of the release. The
        # sb-freebsd zip is added only when this whole step succeeds.
        continue-on-error: true
        run: |
          sudo mkdir -p /opt/freebsd-sysroot
          # Resolve the LATEST FreeBSD release dynamically (older ones get pruned
          # from the mirror → 404, which is what broke a pinned version). Grab just
          # the libc/crt + headers clang needs to link a FreeBSD binary.
          VER=$(curl -fsSL https://download.freebsd.org/releases/amd64/ \
            | grep -oE '[0-9]+\.[0-9]+-RELEASE' | sort -V | uniq | tail -1)
          echo "Latest FreeBSD release: $VER"
          curl -fsSL "https://download.freebsd.org/releases/amd64/$VER/base.txz" \
            | sudo tar -xJf - -C /opt/freebsd-sysroot ./lib ./usr/lib ./usr/include
          make build-cli-releases-freebsd

      - name: Upload linux/windows/freebsd artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            silverbullet-server-*.zip
            sb-*.zip
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Setup repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build server + CLI release archives (darwin x2)
        run: |
          make build-server-releases-macos
          make build-cli-releases-rust-macos

      - name: Import certificate into keychain
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12

          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 20)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm certificate.p12

      - name: Sign and notarize macOS binaries
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode \
            > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          IDENTITY="Developer ID Application: Zef Hemel ($APPLE_TEAM_ID)"

          # Both the server and the `sb` CLI darwin archives.
          for zip_file in *-darwin-*.zip; do
            echo "=== Processing $zip_file ==="
            zip_file="$(pwd)/$zip_file"

            WORK_DIR=$(mktemp -d)
            unzip -o "$zip_file" -d "$WORK_DIR"
            BINARY=$(ls "$WORK_DIR")

            codesign --force --options runtime \
              --sign "$IDENTITY" \
              --timestamp \
              "$WORK_DIR/$BINARY"

            codesign --verify --verbose "$WORK_DIR/$BINARY"

            NOTARIZE_ZIP="$WORK_DIR/notarize.zip"
            ditto -c -k --keepParent "$WORK_DIR/$BINARY" "$NOTARIZE_ZIP"

            xcrun notarytool submit "$NOTARIZE_ZIP" \
              --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_KEY_ISSUER_ID" \
              --wait --timeout 10m

            rm "$zip_file"
            (cd "$WORK_DIR" && zip "$zip_file" "$BINARY")

            rm -rf "$WORK_DIR"
          done

          rm -rf ~/private_keys

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            silverbullet-server-darwin-*.zip
            sb-darwin-*.zip
          if-no-files-found: error

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to the edge-rust prerelease
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: false
          tag_name: edge-rust
          name: Rust edge (early access)
          body: Automated Rust edge build from commit ${{ github.sha }}
          prerelease: true
          files: |
            dist/silverbullet-server-*.zip
            dist/sb-*.zip
