name: Rust edge (early access)

# Publishes EARLY-ACCESS Docker images of the Rust SilverBullet server on every
# push to the `rust-backend` branch:
#   :rust-edge              — base Alpine/musl image (no Chromium)
#   :rust-edge-runtime-api  — base + Chromium, so /.runtime/* (server-side Lua) works
# These never touch the stable :v2 / :edge / :latest images.
on:
  workflow_dispatch:
  push:
    branches:
      - "rust-backend"

env:
  IMAGE_NAME: silverbullet
  NAMESPACE_GITHUB: silverbulletmd
  NAMESPACE_DOCKER: zefhemel

jobs:
  rust-edge:
    runs-on: ubuntu-latest
    steps:
      - name: Setup repo
        uses: actions/checkout@v4
        with:
          # Full history + tags so the in-image `git describe` produces a
          # meaningful public_version.ts.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to the ghcr Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # amd64 only for early access — the Dockerfile builds the Rust binary
      # in-image (musl-static on Alpine), and an arm64 build under QEMU would be
      # very slow. arm64 can be added once cross-compilation (Project 4) lands.
      - name: Build and push :rust-edge (base, no Chromium)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rust
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.NAMESPACE_DOCKER }}/${{ env.IMAGE_NAME }}:rust-edge
            ghcr.io/${{ env.NAMESPACE_GITHUB }}/${{ env.IMAGE_NAME }}:rust-edge
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push :rust-edge-runtime-api (base + Chromium)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rust.runtime-api
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: |
            BASE_IMAGE=ghcr.io/${{ env.NAMESPACE_GITHUB }}/${{ env.IMAGE_NAME }}:rust-edge
          tags: |
            ${{ env.NAMESPACE_DOCKER }}/${{ env.IMAGE_NAME }}:rust-edge-runtime-api
            ghcr.io/${{ env.NAMESPACE_GITHUB }}/${{ env.IMAGE_NAME }}:rust-edge-runtime-api
          cache-from: type=gha
          cache-to: type=gha,mode=max
