name: Rust edge (early access)

# Builds EARLY-ACCESS Docker images of the Rust SilverBullet server on every
# push to the `rust-backend` branch, for BOTH linux/amd64 and linux/arm64:
#   :rust-edge              — base Alpine/musl image (no Chromium)
#   :rust-edge-runtime-api  — base + Chromium, so /.runtime/* (server-side Lua) works
#
# The Dockerfile builds the Rust binary IN-image, so we build each arch on its
# own NATIVE runner (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm) instead
# of emulating arm64 under QEMU — then a `manifest` job stitches the per-arch
# images into multi-arch tags. Published to ghcr only (early access); never
# touches the stable :v2 / :edge / :latest images.
on:
  workflow_dispatch:
  push:
    branches:
      - "rust-backend"

env:
  IMAGE: ghcr.io/silverbulletmd/silverbullet

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Setup repo
        uses: actions/checkout@v4
        with:
          # Full history + tags so the in-image `git describe` produces a
          # meaningful public_version.ts.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the ghcr Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rust
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: ${{ env.IMAGE }}:rust-edge-${{ matrix.arch }}
          cache-from: type=gha,scope=base-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=base-${{ matrix.arch }}

      - name: Build and push runtime-api (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rust.runtime-api
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          build-args: |
            BASE_IMAGE=${{ env.IMAGE }}:rust-edge-${{ matrix.arch }}
          tags: ${{ env.IMAGE }}:rust-edge-runtime-api-${{ matrix.arch }}
          cache-from: type=gha,scope=rta-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=rta-${{ matrix.arch }}

  # Stitch the per-arch images into multi-arch manifest tags.
  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to the ghcr Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests (:rust-edge, :rust-edge-runtime-api)
        run: |
          docker buildx imagetools create -t "$IMAGE:rust-edge" \
            "$IMAGE:rust-edge-amd64" \
            "$IMAGE:rust-edge-arm64"
          docker buildx imagetools create -t "$IMAGE:rust-edge-runtime-api" \
            "$IMAGE:rust-edge-runtime-api-amd64" \
            "$IMAGE:rust-edge-runtime-api-arm64"
