name: Rust edge (early access)
on:
  workflow_dispatch:
  push:
    branches:
      - "rust-backend"

env:
  IMAGE: ghcr.io/silverbulletmd/silverbullet

jobs:
  rust-edge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Setup repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup Rust (with musl targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - name: Install cross-toolchains
        run: |
          sudo apt-get update
          # apt-only: musl-tools (x86_64-musl) + the aarch64 GNU cross-gcc, which
          # compiles ring's C and drives the link; Rust supplies the static musl
          # libc itself (self-contained). No third-party musl.cc download. The
          # linker/CC wiring lives in .cargo/config.toml.
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      - name: Install npm dependencies
        run: npm ci

      - name: Cross-compile static musl binaries (amd64 + arm64)
        run: |
          npm run build
          cargo build --release -p silverbullet --target x86_64-unknown-linux-musl
          cargo build --release -p silverbullet --target aarch64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/silverbullet silverbullet-amd64
          cp target/aarch64-unknown-linux-musl/release/silverbullet silverbullet-arm64
          # Assert both are fully static (musl) — a glibc-dynamic binary would
          # build fine but fail to start on the Alpine runtime image. A dynamic
          # binary names an ELF interpreter (the loader); a static / static-pie
          # musl binary does not.
          for b in silverbullet-amd64 silverbullet-arm64; do
            echo "== $b =="; file "$b"
            if file "$b" | grep -q "interpreter"; then
              echo "ERROR: $b is dynamically linked (needs a loader); expected static musl"; exit 1
            fi
          done

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the ghcr Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :rust-edge (base, multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rust
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ env.IMAGE }}:rust-edge
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push :rust-edge-runtime-api (base + Chromium, multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rust.runtime-api
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            BASE_IMAGE=${{ env.IMAGE }}:rust-edge
          tags: ${{ env.IMAGE }}:rust-edge-runtime-api
          cache-from: type=gha
          cache-to: type=gha,mode=max
