name: Docker

on:
  workflow_dispatch:
  push:
    # TODO: switch rust-backend → main after merge
    branches:
      - "rust-backend"
    tags:
      - "*"

env:
  ARCHITECTURES: linux/arm64,linux/amd64,linux/arm/v7
  IMAGE_NAME: silverbullet
  WEBSITE_IMAGE: zefhemel/silverbullet-website
  NAMESPACE_GITHUB: silverbulletmd
  NAMESPACE_DOCKER: zefhemel

jobs:
  docker-main:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Setup repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup Rust (with musl targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,armv7-unknown-linux-musleabihf

      - name: Install cross-toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      - name: Install npm dependencies
        run: npm ci

      - name: Cross-compile static musl binaries (amd64 + arm64 + arm/v7)
        run: |
          make build-for-docker
          for b in silverbullet-amd64 silverbullet-arm64 silverbullet-arm; do
            echo "== $b =="; file "$b"
            if file "$b" | grep -q "interpreter"; then
              echo "ERROR: $b is dynamically linked (needs a loader); expected static musl"; exit 1
            fi
          done

      - name: Set up QEMU for multi-arch builds with buildx
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.ARCHITECTURES }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: ${{ env.ARCHITECTURES }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to the ghcr Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            # Set the different image names(paces) for docker-hub & ghcr
            ${{ env.NAMESPACE_DOCKER }}/${{ env.IMAGE_NAME }}
            ghcr.io/${{ env.NAMESPACE_GITHUB }}/${{ env.IMAGE_NAME }}
          tags: |
            # When pushing a tag, release a tagged release :x.x.x
            type=semver,pattern={{raw}},enable=true
            # When pushing a tag (type=semver) push to :latest too
            type=semver,pattern=latest,enable=true
            # When pushing to the rust-backend branch, release as :edge
            # TODO: switch rust-backend → main after merge
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/rust-backend' }}

      - name: Build and push main docker images
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.ARCHITECTURES }}
          push: true
          file: Dockerfile
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Runtime API: Extract metadata"
        id: rc_meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.NAMESPACE_DOCKER }}/${{ env.IMAGE_NAME }}
            ghcr.io/${{ env.NAMESPACE_GITHUB }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{raw}}-runtime-api,enable=true
            type=semver,pattern=latest-runtime-api,enable=true
            # TODO: switch rust-backend → main after merge
            type=raw,value=edge-runtime-api,enable=${{ github.ref == 'refs/heads/rust-backend' }}

      - name: "Runtime API: Build and push"
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.ARCHITECTURES }}
          push: true
          file: Dockerfile.runtime-api
          provenance: false
          build-args: |
            BASE_IMAGE=ghcr.io/${{ env.NAMESPACE_GITHUB }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          tags: ${{ steps.rc_meta.outputs.tags }}
          labels: ${{ steps.rc_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-website:
    runs-on: ubuntu-latest
    # Wait for main image so the base image is available (especially for release tags)
    needs: docker-main

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Website: Extract metadata (tags, labels) for docker"
        id: website_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEBSITE_IMAGE }}
          tags: |
            # TODO: switch rust-backend → main after merge (type=edge only fires
            # on the default branch, so during the transition the website :edge
            # tag is driven explicitly off rust-backend).
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/rust-backend' }}
            type=semver,pattern=latest,enable=true

      - name: "Website: Build and push"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.website
          push: true
          provenance: false
          build-args: |
            # TODO: switch rust-backend → main after merge (and likely flip the
            # branch base tag back to v2 if main resumes publishing :v2).
            BASE_IMAGE=zefhemel/silverbullet:${{ startsWith(github.ref, 'refs/tags/') && 'latest' || 'edge' }}
          tags: ${{ steps.website_meta.outputs.tags }}
          labels: ${{ steps.website_meta.outputs.labels }}
